site_name: "shplot"
site_url: "https://jkoushik.me/shplot"
repo_url: "https://github.com/jayanthkoushik/shplot"
site_description: "Documentation for Python package 'shplot'."
site_author: "Jayanth Koushik"
copyright: "Copyright (c) 2023 Jayanth Koushik"

docs_dir: "docs/www"
site_dir: "_site"

nav:
  - "Home": "index.md"
  - "Usage":
      - "shplot.profiles": "usage/shplot.profiles.md"
      - "shplot.profiles.builtin": "usage/shplot.profiles.builtin.md"

plugins:
  - search
  - offline
  - mike:
      canonical_version: "latest"
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            separate_signature: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_source: false

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: "#"

extra:
  version:
    provider: mike

theme:
  name: "material"
  features:
    - navigation.instant
    - navigation.expand
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: "default"
      toggle:
        icon: "material/weather-sunny"
        name: "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: "slate"
      toggle:
        icon: "material/weather-night"
        name: "Switch to light mode"
